services:
  db:
    image: postgres:16
    container_name: scpd-cms-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scpd_cms
    ports:
      # Host port bumped outside Windows excluded range 55404-55503
      - "55400:5432"
    volumes:
      - scpd_cms_db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d scpd_cms" ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  scpd_cms_db_data:
